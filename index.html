<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACUDE 2026 - Sistema de Cuestionarios</title>
    
    <!-- BOOTSTRAP 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .card-materia {
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .card-materia:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .card-materia .card-body {
            background: white;
            padding: 2rem 1rem;
        }
        
        .icono-materia {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .badge-preguntas {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        
        <!-- ENCABEZADO -->
        <div class="text-center text-white mb-5">
            <i class="fas fa-graduation-cap fa-4x mb-3"></i>
            <h1 class="display-4 fw-bold">ACUDE 2026</h1>
            <p class="lead">Sistema de Cuestionarios Interactivos</p>
            <p class="text-white-50" id="loading-status">Cargando materias...</p>
        </div>
        
        <!-- SPINNER DE CARGA -->
        <div id="spinner" class="loading-spinner">
            <div class="spinner-border text-light" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
        
        <!-- CONTENEDOR DE TARJETAS (INICIALMENTE VACÍO) -->
        <div class="row g-4" id="contenedor-materias" style="display: none;"></div>
        
        <!-- PIE DE PÁGINA -->
        <div class="text-center text-white mt-5">
            <p class="small opacity-75">
                <i class="fas fa-code-branch me-1"></i>
                Desarrollado con Bootstrap, FontAwesome y Sweet Alert
            </p>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ============================================ -->
    <!-- CARGA INTELIGENTE DE ARCHIVOS -->
    <!-- ============================================ -->
    <script>
        // Lista de archivos que VAS A CARGAR (SOLO LOS QUE EXISTEN)
        const archivosACargar = [
    // ============================================
    // ARCHIVO BASE (OBLIGATORIO)
    // ============================================
    'js/datos.js',                    // Estructura base con las 15 materias
    
    // ============================================
    // MATERIAS TRONCALES
    // ============================================
    'js/datos-lengua.js',              // Lengua Española (100 preguntas)
    'js/datos-razonamiento.js',        // Razonamiento Matemático
    'js/datos-ingles.js',              // Inglés
    
    // ============================================
    // CIENCIAS QUÍMICO-BIOLÓGICAS
    // ============================================
    'js/datos-biologia.js',            // Biología
    'js/datos-quimica.js',              // Química
    'js/datos-matematicas.js',          // Matemáticas (Ciencias)
    'js/datos-fisica.js',               // Física
    
    // ============================================
    // CIENCIAS SOCIALES Y HUMANIDADES
    // ============================================
    'js/datos-historia.js',             // Historia
    'js/datos-literatura.js',            // Literatura
    'js/datos-derecho.js',               // Derecho
    
    // ============================================
    // CIENCIAS EXACTAS INGENIERÍA
    // ============================================
    'js/datos-quimica-ing.js',           // Química (Ingeniería)
    'js/datos-matematicas-ing.js',        // Matemáticas (Ingeniería)
    'js/datos-fisica-ing.js',             // Física (Ingeniería)
    
    // ============================================
    // CIENCIAS ECONÓMICO ADMINISTRATIVAS
    // ============================================
    'js/datos-economia.js',               // Economía y Administración
    'js/datos-mates-financieras.js'        // Matemáticas Financieras
];
        console.log("📂 Archivos a cargar:", archivosACargar);
        
        let archivosCargados = 0;
        
        function cargarScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    console.log(`✅ Cargado: ${src}`);
                    archivosCargados++;
                    resolve();
                };
                script.onerror = () => {
                    console.warn(`⚠️ No encontrado: ${src} (se omite)`);
                    archivosCargados++;
                    resolve(); // Resolvemos igual para no bloquear
                };
                document.head.appendChild(script);
            });
        }
        
        // Cargar todos los archivos en secuencia
        async function cargarTodosLosArchivos() {
            for (const archivo of archivosACargar) {
                await cargarScript(archivo);
            }
            
            // Cuando todos terminen (existan o no), inicializar
            inicializarPagina();
        }
        
        function inicializarPagina() {
            console.log("🚀 Inicializando página...");
            
            // Ocultar spinner
            document.getElementById('spinner').style.display = 'none';
            
            // Verificar que DATOS_ACUDE existe
            if (typeof DATOS_ACUDE === 'undefined') {
                document.getElementById('loading-status').textContent = 'Error al cargar datos';
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'No se pudo cargar el banco de datos. Verifica que js/datos.js exista.',
                    confirmButtonText: 'Entendido'
                });
                return;
            }
            
            const contenedor = document.getElementById('contenedor-materias');
            const materias = DATOS_ACUDE.materias;
            
            console.log("📚 Materias disponibles:", materias);
            
            if (!materias || materias.length === 0) {
                document.getElementById('loading-status').textContent = 'No hay materias disponibles';
                return;
            }
            
            // Actualizar estado
            document.getElementById('loading-status').textContent = 'Listo!';
            
            // Mostrar contenedor
            contenedor.style.display = 'flex';
            
            // Generar tarjetas
            materias.forEach(materia => {
                // Verificar cuántas preguntas tiene
                let totalPreguntas = 0;
                if (DATOS_ACUDE.preguntas && DATOS_ACUDE.preguntas[materia.id]) {
                    totalPreguntas = DATOS_ACUDE.preguntas[materia.id].length;
                }
                
                const col = document.createElement('div');
                col.className = 'col-lg-4 col-md-6 col-12';
                
                col.innerHTML = `
                    <div class="card card-materia h-100">
                        <div class="card-body text-center position-relative">
                            <span class="badge-preguntas">
                                <i class="fas fa-question-circle me-1"></i>${totalPreguntas} preguntas
                            </span>
                            
                            <i class="fas ${materia.icono} icono-materia" style="color: ${materia.color || '#667eea'}"></i>
                            
                            <h3 class="h4 mb-2">${materia.nombre}</h3>
                            
                            <p class="text-muted small mb-3">${materia.descripcion || 'Practica con preguntas estilo MCAT'}</p>
                            
                            ${totalPreguntas > 0 ? 
                                `<a href="examen.html?materia=${materia.id}" class="btn btn-primary w-100">
                                    <i class="fas fa-play-circle me-1"></i>Comenzar práctica
                                </a>` : 
                                `<button class="btn btn-secondary w-100" disabled>
                                    <i class="fas fa-ban me-1"></i>Sin preguntas
                                </button>`
                            }
                        </div>
                    </div>
                `;
                
                contenedor.appendChild(col);
            });
            
            console.log("✅ Página inicializada correctamente");
        }
        
        // Iniciar carga cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', cargarTodosLosArchivos);
        
    </script>
</body>
</html>
